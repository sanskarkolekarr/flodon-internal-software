services:
  - type: web
    name: flodon-discord-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node apps/discord-bot/src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.x

  - type: web
    name: flodon-internal-software
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node apps/internal-software/src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.x
